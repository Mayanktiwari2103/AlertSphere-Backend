# 1. Database Connection (Uses Railway Variables)
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT:3306}/${MYSQLDATABASE}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=8081

# 2. AWS S3 (Image Storage)
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY}
cloud.aws.credentials.secret-key=${AWS_SECRET_KEY}
cloud.aws.region.static=${AWS_REGION}
aws.s3.bucket-name=${AWS_BUCKET_NAME}

# Increase file size limits (Allow up to 20MB per file)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# 3. Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# 4. Twilio (Alerts)
twilio.sid=${TWILIO_SID}
twilio.token=${TWILIO_AUTH_TOKEN}
twilio.phone=${TWILIO_PHONE}

spring.ai.google.genai.api-key=${GEMINI_API_KEY}